<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>The Peter Zone</title>
    <script>
      // GitHub Pages SPA redirect trick:
      // Store the full URL in sessionStorage, then redirect to root.
      // index.html will read it and restore the URL via history.replaceState.
      sessionStorage.setItem('spa_redirect', location.href);
    </script>
    <meta http-equiv="refresh" content="0;URL='/'" />
  </head>
  <body></body>
</html>
